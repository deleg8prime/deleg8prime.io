<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction - deleg8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f1219 0%, #1a1f2e 100%);
            color: #b0b8c1;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse 50% 80% at 50% 0%, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(240, 147, 251, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }

        container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .construction-icon {
            font-size: 120px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 20px;
            color: white;
            letter-spacing: -1px;
            animation: slideInDown 0.8s ease;
        }

        .subtitle {
            font-size: 24px;
            margin-bottom: 40px;
            color: #b0b8c1;
            font-weight: 300;
            animation: slideInUp 0.8s ease 0.2s backwards;
        }

        .description {
            font-size: 18px;
            color: #8a94a6;
            margin-bottom: 50px;
            line-height: 1.8;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: slideInUp 0.8s ease 0.4s backwards;
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            margin: 40px auto;
            overflow: hidden;
            animation: slideInUp 0.8s ease 0.6s backwards;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            width: 65%;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 50%;
            }
            50% {
                width: 80%;
            }
            100% {
                width: 50%;
            }
        }

        .status {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: slideInUp 0.8s ease 0.8s backwards;
        }

        .features {
            margin-top: 80px;
            animation: slideInUp 0.8s ease 1s backwards;
        }

        .features h3 {
            font-size: 20px;
            color: white;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .feature-item {
            padding: 25px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.5) 0%, rgba(42, 47, 62, 0.5) 100%);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.8) 0%, rgba(42, 47, 62, 0.8) 100%);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .feature-name {
            color: white;
            font-weight: 600;
        }

        .cta-section {
            margin-top: 80px;
        }

        .cta-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 50px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            display: inline-block;
            animation: slideInUp 0.8s ease 1.2s backwards;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
        }

        .cta-button:hover::before {
            left: 0;
        }

        .back-link {
            margin-top: 50px;
            animation: slideInUp 0.8s ease 1.4s backwards;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: #764ba2;
            gap: 12px;
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .construction-icon {
                font-size: 80px;
            }

            h1 {
                font-size: 42px;
            }

            .subtitle {
                font-size: 20px;
            }

            .description {
                font-size: 16px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .construction-icon {
                font-size: 60px;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 18px;
            }

            .cta-button {
                padding: 14px 35px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <container>
        <div class="construction-icon">
            <i class="fas fa-tools"></i>
        </div>

        <h1>Under Construction</h1>
        
        <div class="subtitle">Something Amazing is Coming!</div>
        
        <div class="description">
            We're working hard behind the scenes to bring you an exceptional experience. This page is being crafted with care and attention to detail.
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status">65% Complete</div>

        <div class="features">
            <h3>What's Coming Soon</h3>
            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-rocket"></i>
                    </div>
                    <div class="feature-name">Advanced Features</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="feature-name">Enhanced Security</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-zap"></i>
                    </div>
                    <div class="feature-name">Lightning Fast</div>
                </div>
            </div>
        </div>

        <div class="cta-section">
            <button class="cta-button">Notify Me When Ready</button>
        </div>

        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </container>

    <script>
        document.querySelector('.cta-button').addEventListener('click', function() {
            alert('Thank you! You\'ll be notified when this page launches.');
        });
    </script>
</body>
</html>
